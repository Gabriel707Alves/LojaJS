<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja JS — Carrinho de Compras</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- Header com logo, menu hamburguer, navegação e botão de carrinho -->
    <header class="header">
        <div class="container header-inner">

            <a href="#" class="logo">Loja<span>JS</span></a>

            <!-- Botão hamburguer — JS: toggle do menu em mobile -->
            <button class="menu-btn" id="menu-btn" aria-label="Abrir menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="nav" id="nav">
                <a href="#" class="nav-link">Início</a>
                <a href="#" class="nav-link">Produtos</a>
                <a href="#" class="nav-link">Contato</a>
            </nav>

            <!-- Botão do carrinho — JS: abrir/fechar carrinho -->
            <button class="cart-btn" id="cart-btn" aria-label="Abrir carrinho">
                🛒
                <!-- JS: atualizar este número ao adicionar/remover produtos -->
                <span class="cart-count" id="cart-count">0</span>
            </button>

        </div>
    </header>
</body>

</html>
